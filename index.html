<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Office Sweepstake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #181b23;
      --bg3:       #1e2130;
      --border:    rgba(255,255,255,0.08);
      --border-s:  rgba(255,255,255,0.14);
      --text:      #e2e4ec;
      --muted:     #8b8fa8;
      --faint:     #4a4d60;
      --green:     #5DCAA5;
      --green-bg:  #0a2e1f;
      --green-bd:  #1D9E75;
      --amber:     #FAC775;
      --amber-bg:  #2a1e06;
      --amber-bd:  #BA7517;
      --red:       #F09595;
      --red-bg:    #2a0f0f;
      --red-bd:    #A32D2D;
      --blue:      #85B7EB;
      --blue-bg:   #0a1e33;
      --blue-bd:   #185FA5;
      --gold:      #EF9F27;
      --silver:    #adb5bd;
      --bronze:    #cd7f32;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* header */
    .hdr { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .hdr-left h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.3px; }
    .hdr-left p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
      border: 0.5px solid var(--border); background: var(--bg2); color: var(--muted);
      white-space: nowrap;
    }
    .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
    .status-pill.live .dot { background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
    .status-pill.err  .dot { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* stat strip */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: .8rem 1rem; }
    .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing:.05em; margin-bottom: 3px; }
    .stat .val { font-size: 21px; font-weight: 600; color: var(--text); }
    .stat .val.g { color: var(--green); }
    .stat .val.a { color: var(--amber); }
    .stat .val.sm { font-size: 14px; padding-top: 4px; color: var(--muted); }

    /* section divider */
    .section { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase;
      letter-spacing: .07em; margin: 1.4rem 0 .6rem; display: flex; align-items: center; gap: 8px; }
    .section::after { content:''; flex:1; height:.5px; background: var(--border); }

    /* person card */
    .card {
      background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px;
      padding: .8rem 1rem; margin-bottom: 8px;
      display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 12px;
      transition: opacity .2s;
    }
    .card.out { opacity: .4; }
    .card.you { border-color: var(--blue-bd); }

    .rank { font-size: 15px; font-weight: 600; color: var(--muted); text-align: center; }
    .rank.gold   { color: var(--gold); }
    .rank.silver { color: var(--silver); }
    .rank.bronze { color: var(--bronze); }

    .name { font-size: 15px; font-weight: 600; color: var(--text); }
    .you-tag { font-size: 11px; color: var(--blue); margin-left: 5px; font-weight: 400; }
    .next { font-size: 11px; color: var(--blue); margin-top: 3px; }
    .headtohead { font-size: 11px; color: var(--amber); margin-top: 2px; }

    .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      border: 0.5px solid; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;
    }
    .badge-qf   { background: var(--green-bg); color: var(--green);  border-color: var(--green-bd); }
    .badge-live { background: var(--blue-bg);  color: var(--blue);   border-color: var(--blue-bd); }
    .badge-out  { background: #1c1e28;          color: var(--faint);  border-color: #2a2d3a; }
    .badge-note { font-size: 10px; opacity: .65; }

    .status-col { text-align: right; }
    .status-in  { font-size: 13px; font-weight: 600; color: var(--green); }
    .status-out { font-size: 13px; font-weight: 600; color: var(--faint); }
    .status-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* loading / error */
    #loading { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: var(--red-bg); border: .5px solid var(--red-bd); border-radius: 10px;
      padding: 1rem 1.25rem; color: var(--red); font-size: 13px; margin-bottom: 1rem; }

    /* footer */
    .footer { margin-top: 1.5rem; font-size: 12px; color: var(--faint); text-align: center; line-height: 1.8; }
    .footer a { color: var(--muted); }

    @media(max-width:560px){
      .card { grid-template-columns: 30px 1fr auto; gap: 8px; }
      .name { font-size: 14px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-left">
      <h1>⚽ World Cup 2026 — Office Sweepstake</h1>
      <p id="subtitle">Quarter-finals · Updated live</p>
    </div>
    <div class="status-pill" id="pill">
      <span class="dot"></span><span id="pill-txt">Connecting…</span>
    </div>
  </div>

  <div class="error-box" id="err" style="display:none"></div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="lbl">Stage</div><div class="val sm" id="s-stage">Quarter-finals</div></div>
    <div class="stat"><div class="lbl">Still alive</div><div class="val g" id="s-alive">—</div></div>
    <div class="stat"><div class="lbl">Eliminated</div><div class="val a" id="s-out">—</div></div>
    <div class="stat"><div class="lbl">Data as of</div><div class="val sm" id="s-time">—</div></div>
  </div>

  <div id="loading"><div class="spinner"></div>Loading scores…</div>
  <div id="board" style="display:none"></div>

  <div class="footer">
    Live data via <a href="https://football-data.org" target="_blank">football-data.org</a> ·
    Refreshes every 3 min · <span id="countdown"></span>
  </div>

</div>
<script>
/* ── CONFIG ── */
const REFRESH   = 5 * 60 * 1000;  // re-read scores.json every 5 minutes

/* ── SWEEPSTAKE ──
   status: "qf" = still in (quarter-finalist), "out" = eliminated
   next:   upcoming fixture label (QF teams only)
   h2h:    sweepstake head-to-head note
   apiNames: how this team appears in the football-data.org API
*/
const SWEEPSTAKE = [
  { person:"Esme", you:true, teams:[
    { name:"Argentina",   apiNames:["Argentina"],            status:"qf",  next:"vs Switzerland · Sat 12 Jul", h2h:"vs Lucienne (Switzerland)" },
    { name:"Uruguay",     apiNames:["Uruguay"],              status:"out", note:"Group stage" },
  ]},
  { person:"Arthur", teams:[
    { name:"Spain",       apiNames:["Spain"],                status:"qf",  next:"vs Belgium · Fri 10 Jul", h2h:"vs Daniel (Belgium)" },
    { name:"Qatar",       apiNames:["Qatar"],                status:"out", note:"Group stage" },
  ]},
  { person:"Louisa", teams:[
    { name:"France",      apiNames:["France"],               status:"qf",  next:"vs Morocco · Thu 9 Jul", h2h:"vs Sarah (Morocco)" },
    { name:"Curaçao",     apiNames:["Curaçao","Curacao"],    status:"out", note:"Group stage" },
  ]},
  { person:"Sarah", teams:[
    { name:"Morocco",     apiNames:["Morocco"],              status:"qf",  next:"vs France · Thu 9 Jul", h2h:"vs Louisa (France)" },
    { name:"Haiti",       apiNames:["Haiti"],                status:"out", note:"Group stage" },
  ]},
  { person:"Rory", teams:[
    { name:"England",     apiNames:["England"],              status:"qf",  next:"vs Norway · Sat 11 Jul", h2h:"vs Arsh (Norway)" },
    { name:"Jordan",      apiNames:["Jordan"],               status:"out", note:"Group stage" },
  ]},
  { person:"Arsh", teams:[
    { name:"Norway",      apiNames:["Norway"],               status:"qf",  next:"vs England · Sat 11 Jul", h2h:"vs Rory (England)" },
    { name:"Algeria",     apiNames:["Algeria"],              status:"out", note:"Round of 32" },
  ]},
  { person:"Daniel", teams:[
    { name:"Belgium",     apiNames:["Belgium"],              status:"qf",  next:"vs Spain · Fri 10 Jul", h2h:"vs Arthur (Spain)" },
    { name:"Senegal",     apiNames:["Senegal"],              status:"out", note:"Round of 32" },
  ]},
  { person:"Lucienne", teams:[
    { name:"Switzerland", apiNames:["Switzerland"],          status:"qf",  next:"vs Argentina · Sat 12 Jul", h2h:"vs Esme (Argentina)" },
    { name:"Sweden",      apiNames:["Sweden"],               status:"out", note:"Round of 32" },
  ]},
  { person:"Olly", teams:[
    { name:"Germany",     apiNames:["Germany"],              status:"out", note:"Round of 32 (pens)" },
    { name:"Canada",      apiNames:["Canada"],               status:"out", note:"Round of 16" },
  ]},
  { person:"David S", teams:[
    { name:"Brazil",      apiNames:["Brazil"],               status:"out", note:"Round of 16" },
    { name:"USA",         apiNames:["United States"],        status:"out", note:"Round of 16" },
  ]},
  { person:"Alessio", teams:[
    { name:"Netherlands", apiNames:["Netherlands"],          status:"out", note:"Round of 32 (pens)" },
    { name:"Austria",     apiNames:["Austria"],              status:"out", note:"Round of 32" },
    { name:"Uzbekistan",  apiNames:["Uzbekistan"],           status:"out", note:"Group stage" },
  ]},
  { person:"Sam", teams:[
    { name:"Colombia",    apiNames:["Colombia"],             status:"out", note:"Round of 16 (pens)" },
    { name:"DR Congo",    apiNames:["DR Congo"],             status:"out", note:"Group stage" },
  ]},
  { person:"Hannah", teams:[
    { name:"Ivory Coast", apiNames:["Côte d'Ivoire","Ivory Coast"], status:"out", note:"Round of 32" },
    { name:"Croatia",     apiNames:["Croatia"],              status:"out", note:"Round of 32" },
    { name:"Japan",       apiNames:["Japan"],               status:"out", note:"Round of 32" },
  ]},
  { person:"Chris", teams:[
    { name:"Saudi Arabia",apiNames:["Saudi Arabia"],         status:"out", note:"Group stage" },
    { name:"Paraguay",    apiNames:["Paraguay"],             status:"out", note:"Round of 16" },
    { name:"Bosnia",      apiNames:["Bosnia and Herzegovina","Bosnia"], status:"out", note:"Round of 32" },
  ]},
  { person:"George", teams:[
    { name:"Cape Verde",  apiNames:["Cabo Verde","Cape Verde"], status:"out", note:"Round of 32" },
    { name:"Ghana",       apiNames:["Ghana"],                status:"out", note:"Group stage" },
    { name:"Iran",        apiNames:["Iran"],                 status:"out", note:"Group stage" },
  ]},
  { person:"Seth", teams:[
    { name:"Egypt",       apiNames:["Egypt"],                status:"out", note:"Round of 16" },
    { name:"S. Korea",    apiNames:["Korea Republic"],       status:"out", note:"Group stage" },
    { name:"Tunisia",     apiNames:["Tunisia"],              status:"out", note:"Group stage" },
  ]},
  { person:"David D", teams:[
    { name:"Mexico",      apiNames:["Mexico"],               status:"out", note:"Round of 16" },
    { name:"Panama",      apiNames:["Panama"],               status:"out", note:"Group stage" },
    { name:"Iraq",        apiNames:["Iraq"],                 status:"out", note:"Group stage" },
  ]},
  { person:"Kaan", teams:[
    { name:"Türkiye",     apiNames:["Türkiye","Turkey"],    status:"out", note:"Group stage" },
    { name:"Ecuador",     apiNames:["Ecuador"],              status:"out", note:"Round of 32" },
  ]},
  { person:"Davied", teams:[
    { name:"Portugal",    apiNames:["Portugal"],             status:"out", note:"Round of 16" },
    { name:"Australia",   apiNames:["Australia"],            status:"out", note:"Round of 32" },
  ]},
  { person:"Luke", teams:[
    { name:"Scotland",    apiNames:["Scotland"],             status:"out", note:"Group stage" },
    { name:"New Zealand", apiNames:["New Zealand"],          status:"out", note:"Group stage" },
  ]},
  { person:"Vicky", teams:[
    { name:"South Africa",apiNames:["South Africa"],         status:"out", note:"Round of 32" },
    { name:"Czechia",     apiNames:["Czechia","Czech Republic"], status:"out", note:"Group stage" },
  ]},
];

/* ── RUNTIME ── */
let refreshTimer, countdownTimer, secondsLeft;
let liveStatuses = {}; // team name (display) → "live" | "finished" | null

window.addEventListener("DOMContentLoaded", loadData);

async function loadData() {
  setStatus("Loading…", false, false);
  try {
    const res = await fetch(`results.json?t=${Date.now()}`);
    if (!res.ok) { showErr(`Could not load results.json (${res.status}). Has the GitHub Action run yet?`); scheduleRefresh(); return; }
    const data = await res.json();
    processAndRender(data);
    scheduleRefresh();
  } catch(e) {
    showErr(`Could not load results — ${e.message}. Retrying…`);
    scheduleRefresh();
  }
}

function processAndRender(data) {
  const teams = data.teams || {};
  /* detect any live matches */
  const hasLive = Object.values(teams).some(t => t.cls === "badge-playing");

  /* enrich sweepstake — look up each team by display name directly */
  const enriched = SWEEPSTAKE.map(p => ({
    ...p,
    teams: p.teams.map(t => {
      const info = teams[t.name] || null;
      const isLive = info && info.cls === "badge-playing";
      return { ...t, info, liveStatus: isLive ? "live" : null };
    })
  }));

  const alive = enriched.filter(p => p.teams.some(t => t.status === "qf"));
  const out   = enriched.filter(p => p.teams.every(t => t.status === "out"));

  render(alive, out, hasLive, data.lastUpdated || "");
}

function render(alive, out, hasLive, lastUpdated) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("board").style.display   = "block";
  document.getElementById("stats").style.display   = "grid";

  /* stats strip */
  document.getElementById("s-alive").textContent = alive.length;
  document.getElementById("s-out").textContent   = out.length;
  document.getElementById("s-time").textContent  = lastUpdated || new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});

  /* status pill */
  if (hasLive) setStatus("Live now", true, false);
  else         setStatus("Up to date", false, false);

  /* medals for alive section */
  const medals = ["🥇","🥈","🥉"];

  function badge(t) {
    if (t.liveStatus === "live") {
      const score = t.info ? t.info.label : "Live";
      return `<span class="badge badge-live">🔴 ${t.name} <span class="badge-note">${score}</span></span>`;
    }
    if (t.status === "qf") {
      const record = t.info ? t.info.label : "QF";
      return `<span class="badge badge-qf">${t.name} <span class="badge-note">${record}</span></span>`;
    }
    const record = t.info ? t.info.label : (t.note || "");
    return `<span class="badge badge-out">${t.name} <span class="badge-note">${record}</span></span>`;
  }

  function personCard(p, rank) {
    const isOut = p.teams.every(t => t.status === "out");
    const rankDisp = rank !== null ? (medals[rank-1] || rank) : "—";
    const rankCls  = rank === 1 ? "gold" : rank === 2 ? "silver" : rank === 3 ? "bronze" : "";
    const qfTeam   = p.teams.find(t => t.status === "qf");
    const nextLine = qfTeam?.next   ? `<div class="next">📅 ${qfTeam.next}</div>` : "";
    const h2hLine  = qfTeam?.h2h    ? `<div class="headtohead">⚔️ Head-to-head: ${qfTeam.h2h}</div>` : "";
    const youTag   = p.you ? `<span class="you-tag">(you)</span>` : "";
    const statusCol = isOut
      ? `<div class="status-col"><div class="status-out">Out</div></div>`
      : `<div class="status-col"><div class="status-in">In ✓</div></div>`;

    return `
      <div class="card ${isOut?"out":""} ${p.you?"you":""}">
        <div class="rank ${rankCls}">${rankDisp}</div>
        <div>
          <div class="name">${p.person}${youTag}</div>
          <div class="badges">${p.teams.map(badge).join("")}</div>
          ${nextLine}${h2hLine}
        </div>
        ${statusCol}
      </div>`;
  }

  let html = "";

  html += `<div class="section">🏆 Still in — quarter-finalists (${alive.length})</div>`;
  alive.forEach((p, i) => { html += personCard(p, i + 1); });

  html += `<div class="section" style="margin-top:1.75rem">❌ Eliminated (${out.length})</div>`;
  out.forEach(p => { html += personCard(p, null); });

  document.getElementById("board").innerHTML = html;
}

/* ── HELPERS ── */
function setStatus(txt, live, err) {
  document.getElementById("pill-txt").textContent = txt;
  const pill = document.getElementById("pill");
  pill.classList.toggle("live", live);
  pill.classList.toggle("err",  err);
}

function showErr(msg) {
  const box = document.getElementById("err");
  box.textContent = "⚠ " + msg;
  box.style.display = "block";
  document.getElementById("loading").style.display = "none";
  setStatus("Error", false, true);
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  secondsLeft = REFRESH / 1000;
  tick();
  countdownTimer = setInterval(tick, 1000);
  refreshTimer   = setTimeout(loadData, REFRESH);
}

function tick() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  document.getElementById("countdown").textContent = `Next refresh in ${m}:${String(s).padStart(2,"0")}`;
  secondsLeft--;
}
</script>
</body>
</html>
