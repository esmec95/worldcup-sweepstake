<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 Office Sweepstake</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e4e9; }
.wrap { background: #0f1117; min-height: 100vh; padding: 0 1rem 2rem; max-width: 900px; margin: 0 auto; }
.header { padding: 1.25rem 0 0.75rem; border-bottom: 0.5px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
.title { font-size: 18px; font-weight: 500; color: #f0f2f5; }
.subtitle { font-size: 13px; color: #8b8f9a; margin-top: 4px; }
.legend { display: flex; gap: 16px; font-size: 12px; color: #8b8f9a; margin-top: 8px; flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-win { background: #1D9E75; }
.dot-draw { background: #EF9F27; }
.dot-none { background: #444; }
.dot-playing { background: #378ADD; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { font-size: 11px; font-weight: 500; color: #8b8f9a; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid rgba(255,255,255,0.1); letter-spacing: 0.05em; text-transform: uppercase; }
thead th.num { text-align: center; }
tbody tr { border-bottom: 0.5px solid rgba(255,255,255,0.07); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.04); }
tbody td { padding: 9px 8px; color: #e2e4e9; vertical-align: middle; }
tbody td.num { text-align: center; color: #8b8f9a; font-size: 13px; }
.rank { font-weight: 500; font-size: 13px; color: #8b8f9a; width: 28px; }
.rank-1 { color: #EF9F27; }
.rank-2 { color: #aaa; }
.rank-3 { color: #cd7f32; }
.person { font-weight: 500; color: #f0f2f5; }
.you { color: #5DCAA5 !important; }
.teams-cell { display: flex; flex-wrap: wrap; gap: 6px; }
.team-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.badge-win { background: #0a2e1f; color: #5DCAA5; border: 0.5px solid #1D9E75; }
.badge-draw { background: #2a1e06; color: #FAC775; border: 0.5px solid #BA7517; }
.badge-loss { background: #2a0f0f; color: #F09595; border: 0.5px solid #A32D2D; }
.badge-none { background: #1c1e24; color: #8b8f9a; border: 0.5px solid #333; }
.badge-playing { background: #0a1e33; color: #85B7EB; border: 0.5px solid #185FA5; }
.pts { font-size: 16px; font-weight: 500; }
.pts-high { color: #5DCAA5; }
.pts-mid { color: #e2e4e9; }
.pts-low { color: #8b8f9a; }
.note { font-size: 11px; color: #555; margin-top: 12px; padding-top: 8px; border-top: 0.5px solid rgba(255,255,255,0.07); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">⚽ World Cup 2026 — Office Sweepstake</div>
    <div class="subtitle" id="subtitle">Loading…</div>
    <div class="legend">
      <span><span class="dot dot-win"></span>Win (3pts)</span>
      <span><span class="dot dot-draw"></span>Draw (1pt)</span>
      <span><span class="dot dot-none"></span>Not played</span>
      <span><span class="dot dot-playing"></span>Playing today</span>
    </div>
  </div>
  <div id="table-wrap"></div>
  <div class="note" id="note"></div>
</div>

<script>
const sweepstake = [
  {person:"Olly",     teams:["Germany","Canada"]},
  {person:"David S",  teams:["Brazil","USA"]},
  {person:"Chris",    teams:["Saudi Arabia","Paraguay","Bosnia"]},
  {person:"George",   teams:["Cape Verde","Ghana","Iran"]},
  {person:"Seth",     teams:["Egypt","S. Korea","Tunisia"]},
  {person:"David D",  teams:["Panama","Iraq","Mexico"]},
  {person:"Alessio",  teams:["Uzbekistan","Austria","Netherlands"]},
  {person:"Hannah",   teams:["Ivory Coast","Turkiye","Japan"]},
  {person:"Arthur",   teams:["Qatar","Spain"]},
  {person:"Kaan",     teams:["Ecuador","Croatia"]},
  {person:"Esme",     teams:["Uruguay","Argentina"]},
  {person:"Sarah",    teams:["Haiti","Morocco"]},
  {person:"Louisa",   teams:["Curacao","France"]},
  {person:"Davied",   teams:["Australia","Portugal"]},
  {person:"Luke",     teams:["Scotland","New Zealand"]},
  {person:"Vicky",    teams:["South Africa","Czechia"]},
  {person:"Sam",      teams:["DR Congo","Colombia"]},
  {person:"Daniel",   teams:["Senegal","Belgium"]},
  {person:"Rory",     teams:["England","Jordan"]},
  {person:"Arsh",     teams:["Norway","Algeria"]},
  {person:"Lucienne", teams:["Sweden","Switzerland"]},
];

const teamKey = t => {
  const map = {"S. Korea":"South Korea","Turkiye":"Turkiye","Ivory Coast":"Ivory Coast","Cape Verde":"Cape Verde","Bosnia":"Bosnia","Curacao":"Curacao","DR Congo":"DR Congo"};
  return map[t] || t;
};

const ptsClass = p => p >= 4 ? "pts-high" : p >= 2 ? "pts-mid" : "pts-low";

function render(sorted) {
  let rank = 1;
  const ranks = sorted.map((row, i) => {
    if (i > 0 && sorted[i].pts < sorted[i-1].pts) rank = i + 1;
    return rank;
  });

  let html = '<table><thead><tr><th class="num">#</th><th>Person</th><th>Teams &amp; results</th><th class="num">Pts</th></tr></thead><tbody>';
  sorted.forEach((row, i) => {
    const rankNum = ranks[i];
    const rankCls = rankNum === 1 ? "rank-1" : rankNum === 2 ? "rank-2" : rankNum === 3 ? "rank-3" : "";
    const medal = rankNum === 1 ? "🥇 " : rankNum === 2 ? "🥈 " : rankNum === 3 ? "🥉 " : "";
    const personCls = row.person === "Esme" ? "person you" : "person";
    const teamBadges = row.teamData.map(t =>
      `<span class="team-badge ${t.cls}">${t.name} <span style="opacity:0.7">${t.label}</span></span>`
    ).join("");
    html += `<tr>
      <td class="num rank ${rankCls}">${medal}${rankNum}</td>
      <td class="${personCls}">${row.person}</td>
      <td><div class="teams-cell">${teamBadges}</div></td>
      <td class="num pts ${ptsClass(row.pts)}">${row.pts}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

async function load() {
  const res = await fetch('results.json?_=' + Date.now());
  const json = await res.json();
  const results = json.teams;

  document.getElementById('subtitle').textContent =
    `Scores as of ${json.lastUpdated} · 3 pts = win, 1 pt = draw`;
  document.getElementById('note').textContent = json.note ? '⚠ ' + json.note : '';

  const data = sweepstake.map(row => {
    let pts = 0;
    const teamData = row.teams.map(t => {
      const key = teamKey(t);
      const r = results[key] || {pts: 0, label: "TBD", cls: "badge-none"};
      pts += r.pts;
      return {name: t, ...r};
    });
    return {...row, teamData, pts};
  });

  data.sort((a, b) => b.pts - a.pts || a.person.localeCompare(b.person));
  render(data);
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
