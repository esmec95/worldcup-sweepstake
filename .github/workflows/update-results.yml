name: Update Results

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  push:
    branches: [main]          # run once on first deploy
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest WC 2026 results
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python update_results.py

      - name: Commit results.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update results [skip ci]" && git push
          )
